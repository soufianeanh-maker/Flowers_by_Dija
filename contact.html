<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Contact Flowers by Dija for custom flower bouquets, wedding flowers, gifts, and floral delivery in Morocco.">
  <title>Contact | Flowers by Dija | Morocco Flowers</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="brand">Flowers by Dija</h1>
      <nav>
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="shop.html">Shop</a>
        <a class="nav-link" href="instagram.html">Instagram</a>
      </nav>
    </div>
  </header>

  <main class="container contact-page">
    <h2 class="page-title">Contact Us</h2>
    <p>To order or inquire, send a message here and we will reply through Instagram or your preferred contact method.</p>

    <form id="orderForm">
      <label>Name</label>
      <input type="text" id="name" required>

      <label>Order or message</label>
      <textarea id="message" rows="4" required></textarea>

      <button class="btn" type="submit">Send message</button>
    </form>

    <p class="note">We will contact you back via Instagram or by the contact method you provide.</p>
    <div id="thankyou" style="display:none;margin-top:1rem;padding:1rem;border:1px solid #e6e6e6;background:#fbfbfb;border-radius:8px"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© <span id="year3"></span> Flowers_by_Dija</p>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
